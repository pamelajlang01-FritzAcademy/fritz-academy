<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fritz Academy</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(#7edcff, #fff4cc);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #102342;
    }
    .card {
      background: white;
      border: 6px solid #111;
      border-radius: 28px;
      padding: 40px;
      max-width: 760px;
      box-shadow: 0 10px 0 #111;
    }
    h1 {
      font-size: 56px;
      margin: 0 0 10px;
    }
    p {
      font-size: 24px;
      font-weight: bold;
    }
    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 16px 24px;
      border: 4px solid #111;
      border-radius: 18px;
      background: #f6c744;
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Fritz Academy</h1>
    <p>Welcome, Academites!</p>
    <p>Cloudflare and GitHub are connected.</p>
    <div class="button">Week 1 Coming Next</div>
  </div>
</body>
</html>
