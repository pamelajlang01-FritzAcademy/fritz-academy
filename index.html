<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fritz Academy</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(#79d9ff 0 45%,#eafaff 46%,#72bf58 47%);color:#102342}
header{margin:16px auto;max-width:1100px;background:#102342;color:white;border:6px solid #111;border-radius:28px;padding:18px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 10px 0 #111}
.logo{font-size:42px;font-weight:900}
main{max-width:1100px;margin:auto;background:#fff8df;border:6px solid #111;border-radius:32px;padding:28px;box-shadow:0 12px 0 #111}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:center}
h1{font-size:64px;margin:0;color:#102342}
p{font-size:24px;font-weight:800}
.card{background:white;border:5px solid #111;border-radius:24px;padding:22px;text-align:center;box-shadow:0 8px 0 #111}
.fritz{max-width:100%;max-height:340px;object-fit:contain}
.startBtn{display:inline-block;background:#f6c744;color:#102342;border:6px solid #111;border-radius:24px;padding:22px 44px;font-size:34px;font-weight:900;box-shadow:0 8px 0 #111;cursor:pointer;margin-top:22px;min-width:360px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:24px}
.tile{background:white;border:5px solid #111;border-radius:22px;padding:18px;text-align:center;font-size:22px;font-weight:900;box-shadow:0 7px 0 #111}
@media(max-width:800px){.hero,.grid{grid-template-columns:1fr}h1{font-size:44px}header{flex-direction:column;text-align:center}.startBtn{width:100%;min-width:0}}
</style>
</head>
<body>
<header>
  <div class="logo">Fritz Academy</div>
  <div>Teacher Mode</div>
</header>

<main>
  <section class="hero">
    <div>
      <h1>Welcome, Academites!</h1>
      <p>Original English lessons with songs, stories, games, readers, worksheets, and rewards.</p>
      <button class="startBtn" onclick="location.href='week1.html'">🚀 Start Week 1</button>
    </div>

    <div class="card">
      <img class="fritz" src="assets/ElevenLabs_image_GPT%20Image%202_Full%20body%20portrait%20of%20Captain%20.png" alt="Captain Fritz">
      <p>Captain Fritz is ready.</p>
    </div>
  </section>

  <section id="week1" class="grid">
    <div class="tile">🎵 Song Video</div>
    <div class="tile">📖 Teacher Story</div>
    <div class="tile">📘 Little Reader 1</div>
    <div class="tile">📗 Little Reader 2</div>
    <div class="tile">🎮 Games</div>
    <div class="tile">⭐ Rewards</div>
  </section>
</main>
</body>
</html>
