<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Fritz Academy — Lesson 1-A</title>

<style>
  :root{
    --navy:#102342;
    --blue:#174ea6;
    --gold:#f6c744;
    --cream:#fffaf0;
    --green:#3f8a4c;
    --red:#b74735;
  }

  *{
    box-sizing:border-box;
  }

  html,
  body{
    margin:0;
    min-height:100%;
    background:#071426;
    font-family:Arial, Helvetica, sans-serif;
    color:var(--navy);
  }

  body{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:18px;
  }

  #app{
    width:min(1100px, 100%);
    min-height:680px;
    background:var(--cream);
    border:7px solid var(--navy);
    border-radius:22px;
    overflow:hidden;
    position:relative;
    box-shadow:0 18px 50px rgba(0,0,0,.35);
  }

  header{
    background:var(--navy);
    color:white;
    padding:14px 22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
  }

  header h1{
    margin:0;
    font-size:24px;
  }

  #status{
    font-size:16px;
    font-weight:bold;
  }

  main{
    min-height:590px;
    padding:34px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
  }

  h2{
    margin:0 0 18px;
    font-size:38px;
  }

  h3{
    font-size:28px;
    margin:10px 0;
  }

  p{
    font-size:25px;
    line-height:1.45;
    max-width:820px;
    margin:12px auto;
  }

  .small{
    font-size:18px;
    color:#526278;
  }

  .big-word{
    font-size:72px;
    font-weight:900;
    color:var(--blue);
    margin:15px;
  }

  .emoji{
    font-size:90px;
    margin:10px;
  }

  .button-row{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:16px;
    margin-top:26px;
  }

  button{
    border:3px solid var(--navy);
    border-radius:14px;
    background:var(--gold);
    color:var(--navy);
    font-size:22px;
    font-weight:bold;
    padding:14px 24px;
    cursor:pointer;
    min-width:150px;
  }

  button:hover{
    transform:translateY(-2px);
  }

  button.secondary{
    background:white;
  }

  button.correct{
    background:#bfe8c3;
  }

  button.teacher{
    min-width:auto;
    font-size:13px;
    padding:7px 10px;
    opacity:.32;
  }

  button.teacher:hover{
    opacity:1;
  }

  .choice-grid{
    display:grid;
    grid-template-columns:repeat(3, minmax(180px,1fr));
    gap:18px;
    width:min(850px,100%);
    margin-top:24px;
  }

  .choice{
    background:white;
    border:4px solid var(--navy);
    border-radius:16px;
    padding:22px 15px;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
  }

  .choice .picture{
    font-size:70px;
    display:block;
    margin-bottom:10px;
  }

  .story-box{
    width:min(820px,100%);
    min-height:320px;
    background:white;
    border:5px solid var(--navy);
    border-radius:18px;
    padding:34px;
    display:flex;
    flex-direction:column;
    justify-content:center;
  }

  .reader{
    font-size:42px;
    font-weight:bold;
    line-height:1.5;
  }

  .reward-card{
    background:white;
    border:5px solid var(--gold);
    border-radius:18px;
    padding:26px;
    min-width:320px;
  }

  .reward-icon{
    font-size:90px;
  }

  #garden{
    width:min(850px,100%);
    height:350px;
    position:relative;
    overflow:hidden;
    border:6px solid var(--navy);
    border-radius:20px;
    background:
      linear-gradient(#8fd3ff 0 45%, #7cc36d 45% 100%);
    margin-top:20px;
  }

  #garden::after{
    content:"";
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:85px;
    background:#6aa257;
  }

  .build-piece{
    position:absolute;
    z-index:3;
    font-size:72px;
    cursor:grab;
    user-select:none;
  }

  .build-piece.selected{
    filter:drop-shadow(0 0 10px var(--gold));
    transform:scale(1.1);
  }

  .inventory{
    display:flex;
    justify-content:center;
    gap:22px;
    flex-wrap:wrap;
    margin:16px 0;
  }

  .inventory button{
    min-width:120px;
  }

  .progress{
    width:100%;
    height:13px;
    background:#d9d9d9;
  }

  #progressBar{
    height:100%;
    width:0;
    background:var(--gold);
    transition:width .25s;
  }

  #teacherPanel{
    position:absolute;
    right:10px;
    bottom:10px;
    display:flex;
    gap:7px;
    z-index:50;
  }

  input{
    width:min(500px,90%);
    padding:15px;
    margin:10px;
    font-size:23px;
    border:3px solid var(--navy);
    border-radius:12px;
  }

  @media(max-width:760px){
    .choice-grid{
      grid-template-columns:1fr;
    }

    main{
      padding:22px 15px 85px;
    }

    h2{
      font-size:30px;
    }

    p{
      font-size:21px;
    }

    .reader{
      font-size:32px;
    }
  }
</style>
</head>

<body>

<div id="app">

  <header>
    <h1>Fritz Academy — Lesson 1-A</h1>
    <div id="status">New Student</div>
  </header>

  <div class="progress">
    <div id="progressBar"></div>
  </div>

  <main id="screen"></main>

  <div id="teacherPanel">
    <button class="teacher" onclick="previousStep()">◀ Teacher Back</button>
    <button class="teacher" onclick="nextStep()">Teacher Next ▶</button>
    <button class="teacher" onclick="resetStudent()">Reset Student</button>
  </div>

</div>

<script>
const SAVE_KEY = "fritz_lesson_1a_profile_v1";

const steps = [
  "setup",
  "teacher-opening",
  "fritz-intro",
  "feelings",
  "feelings-worksheet",
  "reward-flowers",
  "story-1",
  "story-2",
  "story-check",
  "reward-path",
  "alphabet-song",
  "phonics",
  "find-a",
  "reader-1a",
  "reader-1b",
  "reader-1-check",
  "reward-bench",
  "reader-2a",
  "reader-2b",
  "reader-2-check",
  "build",
  "goodbye",
  "complete"
];

let profile = loadProfile();
let stepIndex = profile.stepIndex || 0;
let selectedPiece = null;

function defaultProfile(){
  return {
    name:"",
    spelling:"",
    feeling:"",
    stepIndex:0,
    earned:{
      flowers:false,
      path:false,
      bench:false
    },
    placed:{
      flowers:null,
      path:null,
      bench:null
    },
    completed:false
  };
}

function loadProfile(){
  try{
    const stored = localStorage.getItem(SAVE_KEY);
    return stored ? {...defaultProfile(), ...JSON.parse(stored)} : defaultProfile();
  }catch{
    return defaultProfile();
  }
}

function saveProfile(){
  profile.stepIndex = stepIndex;
  localStorage.setItem(SAVE_KEY, JSON.stringify(profile));
  updateHeader();
}

function updateHeader(){
  const student = profile.name || "New Student";
  document.getElementById("status").textContent =
    `${student} | Build Pieces: ${countPieces()}/3`;

  const percent = ((stepIndex + 1) / steps.length) * 100;
  document.getElementById("progressBar").style.width = `${percent}%`;
}

function countPieces(){
  return Object.values(profile.earned).filter(Boolean).length;
}

function setScreen(html){
  document.getElementById("screen").innerHTML = html;
  updateHeader();
}

function speak(text){
  if(!("speechSynthesis" in window)) return;

  speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "en-US";
  utterance.rate = 0.82;
  speechSynthesis.speak(utterance);
}

function nextStep(){
  if(stepIndex < steps.length - 1){
    stepIndex++;
    saveProfile();
    render();
  }
}

function previousStep(){
  if(stepIndex > 0){
    stepIndex--;
    saveProfile();
    render();
  }
}

function goTo(stepName){
  const found = steps.indexOf(stepName);
  if(found >= 0){
    stepIndex = found;
    saveProfile();
    render();
  }
}

function render(){
  const step = steps[stepIndex];

  switch(step){
    case "setup":
      renderSetup();
      break;

    case "teacher-opening":
      renderTeacherOpening();
      break;

    case "fritz-intro":
      renderFritzIntro();
      break;

    case "feelings":
      renderFeelings();
      break;

    case "feelings-worksheet":
      renderFeelingsWorksheet();
      break;

    case "reward-flowers":
      renderReward("flowers", "🌼", "Garden Flowers");
      break;

    case "story-1":
      renderStory1();
      break;

    case "story-2":
      renderStory2();
      break;

    case "story-check":
      renderStoryCheck();
      break;

    case "reward-path":
      renderReward("path", "🪨", "Garden Path");
      break;

    case "alphabet-song":
      renderAlphabetSong();
      break;

    case "phonics":
      renderPhonics();
      break;

    case "find-a":
      renderFindA();
      break;

    case "reader-1a":
      renderReader(
        "Reader 1",
        "Hello! My name is " + profile.name + ".",
        "reader-1b"
      );
      break;

    case "reader-1b":
      renderReader(
        "Reader 1",
        "I am happy. Captain Fritz is my friend.",
        "reader-1-check"
      );
      break;

    case "reader-1-check":
      renderReaderOneCheck();
      break;

    case "reward-bench":
      renderReward("bench", "🪑", "Garden Bench");
      break;

    case "reader-2a":
      renderReader(
        "Reader 2 — Stretch",
        profile.name + " walks into Fritz Academy.",
        "reader-2b"
      );
      break;

    case "reader-2b":
      renderReader(
        "Reader 2 — Stretch",
        "Captain Fritz says, “Hello, my friend. Welcome to the Academy!”",
        "reader-2-check"
      );
      break;

    case "reader-2-check":
      renderReaderTwoCheck();
      break;

    case "build":
      renderBuild();
      break;

    case "goodbye":
      renderGoodbye();
      break;

    case "complete":
      renderComplete();
      break;
  }
}

function renderSetup(){
  if(profile.name){
    setScreen(`
      <h2>Welcome Back, ${escapeHtml(profile.name)}!</h2>

      <p>Your name is spelled:</p>

      <div class="big-word">
        ${escapeHtml(profile.spelling || profile.name.toUpperCase())}
      </div>

      <p>Your Academy remembers you.</p>

      <div class="button-row">
        <button onclick="nextStep()">Continue Lesson</button>
        <button class="secondary" onclick="resetStudent()">Use a Different Student</button>
      </div>
    `);

    return;
  }

  setScreen(`
    <h2>New Academy Student</h2>

    <p>
      Ask the student to say their name.<br>
      Then ask: <strong>“How do you spell your name?”</strong>
    </p>

    <input id="studentName" placeholder="Student's name" />
    <input id="studentSpelling" placeholder="Spelling, for example: D-I-E-G-O" />

    <div class="button-row">
      <button onclick="saveStudent()">Save Student</button>
    </div>

    <p class="small">
      The Academy will remember this student and their progress on this device.
    </p>
  `);
}

function saveStudent(){
  const name = document.getElementById("studentName").value.trim();
  const spelling = document.getElementById("studentSpelling").value.trim();

  if(!name){
    alert("Enter the student's name.");
    return;
  }

  profile.name = name;
  profile.spelling = spelling || name.toUpperCase().split("").join("-");
  nextStep();
}

function renderTeacherOpening(){
  setScreen(`
    <h2>Teacher Welcome</h2>

    <p>
      This is your teacher-controlled opening.
    </p>

    <div class="story-box">
      <p>
        Greet ${escapeHtml(profile.name)} naturally.
      </p>

      <p>
        Ask:
        <strong>“How are you today?”</strong>
      </p>

      <p>
        Ask the student to say and spell their name.
      </p>
    </div>

    <div class="button-row">
      <button onclick="nextStep()">Start Fritz Academy</button>
    </div>
  `);
}

function renderFritzIntro(){
  setScreen(`
    <div class="emoji">🐶</div>

    <h2>Captain Fritz</h2>

    <p>
      Hello! My name is Captain Fritz.
    </p>

    <p>
      It is nice to meet you, <strong>${escapeHtml(profile.name)}</strong>!
    </p>

    <div class="button-row">
      <button onclick="speak('Hello! My name is Captain Fritz. It is nice to meet you, ${jsText(profile.name)}!')">
        Hear Captain Fritz
      </button>

      <button onclick="nextStep()">Continue</button>
    </div>
  `);
}

function renderFeelings(){
  setScreen(`
    <h2>How Are You Today?</h2>

    <p>Point to the best answer. The teacher clicks it.</p>

    <div class="choice-grid">
      <div class="choice" onclick="chooseFeeling('happy','I am happy.')">
        <span class="picture">😀</span>
        I am happy.
      </div>

      <div class="choice" onclick="chooseFeeling('fine','I am fine.')">
        <span class="picture">🙂</span>
        I am fine.
      </div>

      <div class="choice" onclick="chooseFeeling('sad','I am sad.')">
        <span class="picture">😢</span>
        I am sad.
      </div>
    </div>
  `);
}

function chooseFeeling(id, sentence){
  profile.feeling = id;
  saveProfile();
  speak(sentence);
  nextStep();
}

function renderFeelingsWorksheet(){
  setScreen(`
    <h2>Find the Feeling</h2>

    <p>
      The student points to:
      <strong>I am happy.</strong>
    </p>

    <div class="choice-grid">
      <div class="choice" onclick="wrongChoice()">
        <span class="picture">😢</span>
        I am sad.
      </div>

      <div class="choice" onclick="correctChoice('I am happy.')">
        <span class="picture">😀</span>
        I am happy.
      </div>

      <div class="choice" onclick="wrongChoice()">
        <span class="picture">🙂</span>
        I am fine.
      </div>
    </div>
  `);
}

function wrongChoice(){
  speak("Try again.");
  alert("Try again.");
}

function correctChoice(text){
  speak("Correct! " + text);
  nextStep();
}

function renderReward(piece, icon, label){
  profile.earned[piece] = true;
  saveProfile();

  setScreen(`
    <h2>Build Piece Earned!</h2>

    <div class="reward-card">
      <div class="reward-icon">${icon}</div>
      <h3>${label}</h3>
      <p>You earned this by using English.</p>
    </div>

    <div class="button-row">
      <button onclick="nextStep()">Add to Builder Pack</button>
    </div>
  `);
}

function renderStory1(){
  setScreen(`
    <h2>Story Time</h2>

    <div class="story-box">
      <p>
        Captain Fritz waits at the Academy gate.
      </p>

      <p>
        A new student walks toward him.
      </p>
    </div>

    <div class="button-row">
      <button class="secondary" onclick="speak('Captain Fritz waits at the Academy gate. A new student walks toward him.')">
        AI Read
      </button>

      <button onclick="nextStep()">Next Page</button>
    </div>
  `);
}

function renderStory2(){
  setScreen(`
    <h2>A New Friend</h2>

    <div class="story-box">
      <p>
        Captain Fritz says, “Hello!”
      </p>

      <p>
        ${escapeHtml(profile.name)} says,
        “Hello! My name is ${escapeHtml(profile.name)}.”
      </p>

      <p>
        Captain Fritz smiles.
        “It is nice to meet you.”
      </p>
    </div>

    <div class="button-row">
      <button class="secondary" onclick="speak('Captain Fritz says hello. ${jsText(profile.name)} says, hello, my name is ${jsText(profile.name)}. Captain Fritz says, it is nice to meet you.')">
        AI Read
      </button>

      <button onclick="nextStep()">Story Check</button>
    </div>
  `);
}

function renderStoryCheck(){
  setScreen(`
    <h2>Find the Answer</h2>

    <p>
      Who says, <strong>“Hello!”</strong>?
    </p>

    <div class="choice-grid">
      <div class="choice" onclick="correctChoice('Captain Fritz says hello.')">
        <span class="picture">🐶</span>
        Captain Fritz
      </div>

      <div class="choice" onclick="wrongChoice()">
        <span class="picture">🌳</span>
        A tree
      </div>

      <div class="choice" onclick="wrongChoice()">
        <span class="picture">📘</span>
        A book
      </div>
    </div>
  `);
}

function renderAlphabetSong(){
  setScreen(`
    <h2>Music Box Unlocked!</h2>

    <div class="emoji">🎵</div>

    <p>
      Sing the Alphabet Song.
    </p>

    <div class="button-row">
      <button onclick="openAlphabetVideo()">Play Alphabet Video</button>
      <button onclick="nextStep()">Continue to Phonics</button>
    </div>

    <p class="small">
      Expected file:
      assets/video/alphabet-song.mp4
    </p>
  `);
}

function openAlphabetVideo(){
  const video = document.createElement("video");

  video.src = "assets/video/alphabet-song.mp4";
  video.controls = true;
  video.autoplay = true;

  video.style.position = "fixed";
  video.style.inset = "5%";
  video.style.width = "90%";
  video.style.height = "90%";
  video.style.objectFit = "contain";
  video.style.background = "black";
  video.style.zIndex = "9999";

  video.onclick = () => {
    video.pause();
    video.remove();
  };

  video.onerror = () => {
    video.remove();
    alert("The Alphabet Song video still needs to be uploaded.");
  };

  document.body.appendChild(video);
}

function renderPhonics(){
  setScreen(`
    <h2>Phonics Workshop</h2>

    <div class="big-word">A a</div>

    <p>
      The letter name is <strong>A</strong>.
    </p>

    <p>
      The short sound is:
      <strong>a, a, apple.</strong>
    </p>

    <div class="choice-grid">
      <div class="choice">
        <span class="picture">🍎</span>
        apple
      </div>

      <div class="choice">
        <span class="picture">🐜</span>
        ant
      </div>

      <div class="choice">
        <span class="picture">🗺️</span>
        map
      </div>
    </div>

    <div class="button-row">
      <button class="secondary" onclick="speak('A. Short a. Apple. Ant. Map.')">
        Hear the Sound
      </button>

      <button onclick="nextStep()">Find the Letter A</button>
    </div>
  `);
}

function renderFindA(){
  setScreen(`
    <h2>Find All the A's</h2>

    <p>
      The student points. The teacher clicks the uppercase or lowercase A.
    </p>

    <div class="choice-grid">
      <div class="choice" onclick="correctChoice('Uppercase A.')">
        <span class="picture">A</span>
        Uppercase A
      </div>

      <div class="choice" onclick="wrongChoice()">
        <span class="picture">B</span>
        Letter B
      </div>

      <div class="choice" onclick="correctChoice('Lowercase a.')">
        <span class="picture">a</span>
        Lowercase a
      </div>
    </div>
  `);
}

function renderReader(title, sentence, nextName){
  setScreen(`
    <h2>${title}</h2>

    <div class="story-box">
      <div class="reader">${escapeHtml(sentence)}</div>
    </div>

    <div class="button-row">
      <button class="secondary" onclick="speak('${jsText(sentence)}')">
        Hear It
      </button>

      <button onclick="goTo('${nextName}')">Next</button>
    </div>
  `);
}

function renderReaderOneCheck(){
  setScreen(`
    <h2>Reader 1 Check</h2>

    <p>How does the student feel?</p>

    <div class="choice-grid">
      <div class="choice" onclick="correctChoice('The student is happy.')">
        <span class="picture">😀</span>
        Happy
      </div>

      <div class="choice" onclick="wrongChoice()">
        <span class="picture">😢</span>
        Sad
      </div>

      <div class="choice" onclick="wrongChoice()">
        <span class="picture">😴</span>
        Tired
      </div>
    </div>
  `);
}

function renderReaderTwoCheck(){
  setScreen(`
    <h2>Reader 2 Check</h2>

    <p>Where is ${escapeHtml(profile.name)}?</p>

    <div class="choice-grid">
      <div class="choice" onclick="correctChoice('${jsText(profile.name)} is at Fritz Academy.')">
        <span class="picture">🏫</span>
        At Fritz Academy
      </div>

      <div class="choice" onclick="wrongChoice()">
        <span class="picture">🏖️</span>
        At the beach
      </div>

      <div class="choice" onclick="wrongChoice()">
        <span class="picture">🏠</span>
        At home
      </div>
    </div>
  `);
}

function renderBuild(){
  setScreen(`
    <h2>Build Time</h2>

    <p>
      Choose a piece, then click inside the garden to place it.
    </p>

    <div class="inventory">
      <button onclick="chooseBuildPiece('flowers')">🌼 Flowers</button>
      <button onclick="chooseBuildPiece('path')">🪨 Path</button>
      <button onclick="chooseBuildPiece('bench')">🪑 Bench</button>
    </div>

    <div id="garden" onclick="placePiece(event)">
      ${placedPieceHtml("flowers", "🌼")}
      ${placedPieceHtml("path", "🪨")}
      ${placedPieceHtml("bench", "🪑")}
    </div>

    <div class="button-row">
      <button onclick="finishBuild()">Finish My Build</button>
    </div>
  `);
}

function chooseBuildPiece(piece){
  if(!profile.earned[piece]){
    alert("That piece has not been earned.");
    return;
  }

  selectedPiece = piece;
}

function placePiece(event){
  if(!selectedPiece){
    alert("Choose a build piece first.");
    return;
  }

  const garden = event.currentTarget;
  const rect = garden.getBoundingClientRect();

  profile.placed[selectedPiece] = {
    x: ((event.clientX - rect.left) / rect.width) * 100,
    y: ((event.clientY - rect.top) / rect.height) * 100
  };

  selectedPiece = null;
  saveProfile();
  renderBuild();
}

function placedPieceHtml(piece, icon){
  const position = profile.placed[piece];

  if(!position) return "";

  return `
    <div
      class="build-piece"
      style="
        left:${position.x}%;
        top:${position.y}%;
        transform:translate(-50%,-50%);
      "
    >${icon}</div>
  `;
}

function finishBuild(){
  const placedCount =
    Object.values(profile.placed).filter(Boolean).length;

  if(placedCount < 3){
    alert("Place all three earned pieces first.");
    return;
  }

  nextStep();
}

function renderGoodbye(){
  setScreen(`
    <h2>Mission Debrief</h2>

    <p>
      Great work, ${escapeHtml(profile.name)}!
    </p>

    <p>
      Today you practiced greetings, feelings,
      the letter A, reading, and story understanding.
    </p>

    <p>
      You also built the first section of the Welcome Garden.
    </p>

    <div class="emoji">🎶</div>

    <div class="button-row">
      <button onclick="nextStep()">Finish Lesson</button>
    </div>
  `);
}

function renderComplete(){
  profile.completed = true;
  saveProfile();

  setScreen(`
    <h2>Lesson 1-A Complete!</h2>

    <div class="emoji">🌟</div>

    <p>
      The Welcome Garden has begun.
    </p>

    <p>
      Your work and progress have been saved.
    </p>

    <div class="button-row">
      <button onclick="goTo('build')">Visit My Build</button>
      <button class="secondary" onclick="restartLesson()">Teach Again</button>
    </div>
  `);
}

function restartLesson(){
  stepIndex = 1;
  saveProfile();
  render();
}

function resetStudent(){
  const confirmed = confirm(
    "Reset the student name and all Lesson 1-A progress on this device?"
  );

  if(!confirmed) return;

  localStorage.removeItem(SAVE_KEY);
  profile = defaultProfile();
  stepIndex = 0;
  render();
}

function escapeHtml(value){
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function jsText(value){
  return String(value)
    .replaceAll("\\", "\\\\")
    .replaceAll("'", "\\'")
    .replaceAll("\n", " ");
}

render();
</script>
