<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fritz Academy World</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<style>
body{margin:0;background:#071426;font-family:Arial,sans-serif}
#game{width:100vw;height:100vh}
</style>
</head>
<body>
<div id="game"></div>

<script>
const SAVE_KEY="fritz_academy_world_v7";

function getSave(){
  const old=localStorage.getItem(SAVE_KEY);
  if(old) return JSON.parse(old);
  const fresh={
    studentName:"Student",
    currentStory:"The Academy Begins",
    xp:0,
    stars:0,
    pack:{books:0,bricks:0,blueprints:0,seeds:0,tools:0,keys:0},
    collected:{}
  };
  localStorage.setItem(SAVE_KEY,JSON.stringify(fresh));
  return fresh;
}

class World extends Phaser.Scene{
  constructor(){super("World");}

  preload(){
    this.load.image("campus","assets/fritz_academy_world_map.png");
    this.load.image("fritz_raw","assets/captain_fritz.png");
  }

  create(){
    this.save=getSave();
    this.worldW=2048;
    this.worldH=2048;

    this.physics.world.setBounds(0,0,this.worldW,this.worldH);
    this.cameras.main.setBounds(0,0,this.worldW,this.worldH);

    this.add.image(this.worldW/2,this.worldH/2,"campus").setDisplaySize(this.worldW,this.worldH);

    this.makeCleanSprite("fritz_raw","fritz",238);

    this.createPlayer();
    this.createZones();
    this.createHUD();
    this.createMobileControls();

    this.keys=this.input.keyboard.addKeys("W,A,S,D,UP,DOWN,LEFT,RIGHT,SPACE");
    this.cameras.main.startFollow(this.player,true,.08,.08);
    this.currentZone=null;
  }

  makeCleanSprite(sourceKey,newKey,whiteCutoff){
    const src=this.textures.get(sourceKey).getSourceImage();
    const temp=document.createElement("canvas");
    temp.width=src.width;
    temp.height=src.height;
    const tctx=temp.getContext("2d");
    tctx.drawImage(src,0,0);

    const img=tctx.getImageData(0,0,temp.width,temp.height);
    const d=img.data;

    let minX=temp.width,minY=temp.height,maxX=0,maxY=0;

    for(let y=0;y<temp.height;y++){
      for(let x=0;x<temp.width;x++){
        const i=(y*temp.width+x)*4;
        const r=d[i],g=d[i+1],b=d[i+2];

        if(r>whiteCutoff && g>whiteCutoff && b>whiteCutoff){
          d[i+3]=0;
        }

        if(d[i+3]>20){
          if(x<minX)minX=x;
          if(y<minY)minY=y;
          if(x>maxX)maxX=x;
          if(y>maxY)maxY=y;
        }
      }
    }

    tctx.putImageData(img,0,0);

    const pad=8;
    minX=Math.max(0,minX-pad);
    minY=Math.max(0,minY-pad);
    maxX=Math.min(temp.width,maxX+pad);
    maxY=Math.min(temp.height,maxY+pad);

    const cropW=maxX-minX;
    const cropH=maxY-minY;

    const canvas=this.textures.createCanvas(newKey,cropW,cropH);
    const ctx=canvas.getContext();
    ctx.drawImage(temp,minX,minY,cropW,cropH,0,0,cropW,cropH);
    canvas.refresh();
  }

  createPlayer(){
    this.player=this.add.image(1025,1645,"fritz").setScale(.065);
    this.player.setDepth(20);
    this.physics.add.existing(this.player);
    this.player.body.setCollideWorldBounds(true);
    this.player.body.setSize(45,70);
  }

  createZones(){
    this.zones=[];
    this.zone("Main Hall",1050,760,270,230,"This is where every Academy day begins.");
    this.zone("Library",520,760,300,260,"The Library opens soon.");
    this.zone("Science Lab",1270,430,330,260,"The Science Lab is locked for now.");
    this.zone("Music Hall",1435,650,330,260,"The Music Hall is locked for now.");
    this.zone("Greenhouse",930,1525,360,260,"The Greenhouse needs seeds and tools.");
    this.zone("Workshop",1640,970,360,270,"Rascal builds inventions here.");
    this.zone("History Castle",360,1040,330,280,"The History Castle opens later.");
    this.zone("Canine Training Academy",1600,1620,430,300,"Training games will open here.");
  }

  zone(name,x,y,w,h,message){
    const z=this.add.zone(x,y,w,h);
    this.physics.world.enable(z);
    z.name=name;
    z.message=message;
    this.zones.push(z);
  }

  update(){
    const speed=220;
    let vx=0,vy=0;

    if(this.keys.LEFT.isDown||this.keys.A.isDown) vx=-speed;
    if(this.keys.RIGHT.isDown||this.keys.D.isDown) vx=speed;
    if(this.keys.UP.isDown||this.keys.W.isDown) vy=-speed;
    if(this.keys.DOWN.isDown||this.keys.S.isDown) vy=speed;

    if(this.mobileDir){
      vx=this.mobileDir.x*speed;
      vy=this.mobileDir.y*speed;
    }

    this.player.body.setVelocity(vx,vy);

    if(vx<0)this.player.setFlipX(true);
    if(vx>0)this.player.setFlipX(false);

    this.checkZones();

    if(Phaser.Input.Keyboard.JustDown(this.keys.SPACE)&&this.currentZone){
      this.msg(this.currentZone.name,this.currentZone.message);
    }
  }

  checkZones(){
    let found=null;
    const playerBox=new Phaser.Geom.Rectangle(this.player.x-30,this.player.y-45,60,90);

    for(const z of this.zones){
      if(Phaser.Geom.Rectangle.Overlaps(z.getBounds(),playerBox)){
        found=z;
        break;
      }
    }

    if(found&&!this.currentZone){
      this.currentZone=found;
      this.showPrompt(found.name);
    }

    if(!found&&this.currentZone){
      this.currentZone=null;
      this.hidePrompt();
    }
  }

  showPrompt(name){
    this.hidePrompt();
    this.prompt=this.add.container(400,505).setScrollFactor(0).setDepth(100);
    const bg=this.add.rectangle(0,0,470,50,0xffffff).setStrokeStyle(4,0x111111);
    const txt=this.add.text(0,0,`Press SPACE: ${name}`,{
      fontSize:"21px",
      fontStyle:"bold",
      color:"#102342"
    }).setOrigin(.5);
    this.prompt.add([bg,txt]);
  }

  hidePrompt(){
    if(this.prompt){
      this.prompt.destroy();
      this.prompt=null;
    }
  }

  createHUD(){
    this.hud=this.add.container(0,0).setScrollFactor(0).setDepth(200);

    const top=this.add.rectangle(400,28,790,48,0x102342).setStrokeStyle(4,0x111111);
    this.hudText=this.add.text(20,13,"",{fontSize:"18px",fontStyle:"bold",color:"#ffffff"});

    const bottom=this.add.rectangle(400,575,790,46,0x102342).setStrokeStyle(4,0x111111);
    this.packText=this.add.text(20,561,"",{fontSize:"18px",fontStyle:"bold",color:"#ffffff"});

    this.hud.add([top,this.hudText,bottom,this.packText]);
    this.refreshHUD();
  }

  refreshHUD(){
    const s=this.save,p=s.pack;
    this.hudText.setText(`${s.studentName} | ${s.currentStory} | XP ${s.xp} | Stars ${s.stars}`);
    this.packText.setText(`Pack: 📘 ${p.books}  🧱 ${p.bricks}  📜 ${p.blueprints}  🌱 ${p.seeds}  🔧 ${p.tools}  🔑 ${p.keys}`);
  }

  createMobileControls(){
    const x=70,y=455;
    const make=(txt,dx,dy)=>{
      const b=this.add.text(x+dx,y+dy,txt,{
        fontSize:"28px",
        backgroundColor:"#f6c744",
        color:"#102342",
        padding:{x:12,y:6},
        fontStyle:"bold"
      }).setScrollFactor(0).setInteractive({useHandCursor:true}).setDepth(250);

      b.dir={x:dx===-40?-1:dx===40?1:0,y:dy===-40?-1:dy===40?1:0};
      b.on("pointerdown",()=>this.mobileDir=b.dir);
      b.on("pointerup",()=>this.mobileDir=null);
      b.on("pointerout",()=>this.mobileDir=null);
    };

    make("↑",0,-40);
    make("↓",0,40);
    make("←",-40,0);
    make("→",40,0);
  }

  msg(title,body){
    if(this.popup)this.popup.destroy();

    this.popup=this.add.container(400,300).setScrollFactor(0).setDepth(300);
    const bg=this.add.rectangle(0,0,610,250,0xffffff).setStrokeStyle(6,0x111111);
    const t=this.add.text(0,-85,title,{fontSize:"30px",fontStyle:"bold",color:"#102342"}).setOrigin(.5);
    const b=this.add.text(0,-10,body,{fontSize:"23px",fontStyle:"bold",color:"#102342",align:"center",wordWrap:{width:530}}).setOrigin(.5);
    const close=this.add.text(0,75,"Close",{
      fontSize:"24px",
      fontStyle:"bold",
      color:"#102342",
      backgroundColor:"#f6c744",
      padding:{x:24,y:10}
    }).setOrigin(.5).setInteractive({useHandCursor:true});

    close.on("pointerdown",()=>this.popup.destroy());
    this.popup.add([bg,t,b,close]);
  }
}

new Phaser.Game({
  type:Phaser.AUTO,
  parent:"game",
  width:800,
  height:600,
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
  physics:{default:"arcade"},
  scene:World
});
</script>
</body>
</html>
