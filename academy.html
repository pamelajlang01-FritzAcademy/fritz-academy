<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fritz Academy World</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
<style>
body{margin:0;background:#071426;font-family:Arial,sans-serif}
#game{width:100vw;height:100vh}
</style>
</head>
<body>
<div id="game"></div>

<script>
const SAVE_KEY="fritz_academy_world_v2";

function getSave(){
  let s=localStorage.getItem(SAVE_KEY);
  if(s) return JSON.parse(s);
  let fresh={
    studentName:"Student",
    currentStory:"The Academy Begins",
    xp:0,stars:0,
    pack:{books:0,bricks:0,blueprints:0,seeds:0,tools:0,keys:0},
    academy:{library:{stage:"foundation",progress:0},garden:{stage:"empty",progress:0}},
    collected:{}
  };
  localStorage.setItem(SAVE_KEY,JSON.stringify(fresh));
  return fresh;
}
function setSave(s){localStorage.setItem(SAVE_KEY,JSON.stringify(s));}

class World extends Phaser.Scene{
constructor(){super("World")}
preload(){
 this.load.image("campus","assets/fa_master_campus_v1.png");
 this.load.image("fritz","assets/captain_fritz.png");
 this.load.image("bash","assets/bash.png");
 this.load.image("bear","assets/bear.png");
 this.load.image("nola","assets/nola.png");
 this.load.image("tony","assets/tony.png");
 this.load.image("rascal","assets/rascal.png");
}
create(){
 this.save=getSave();
 this.worldW=1600; this.worldH=1000;
 this.cameras.main.setBounds(0,0,this.worldW,this.worldH);
 this.physics.world.setBounds(0,0,this.worldW,this.worldH);

 this.drawWorld();
 this.createPlayer();
 this.createCharacters();
 this.createCollectibles();
 this.createHUD();
 this.createMobileControls();

 this.cameras.main.startFollow(this.player,true,.08,.08);
 this.keys=this.input.keyboard.addKeys("W,A,S,D,UP,DOWN,LEFT,RIGHT");
}

drawWorld(){
 this.add.image(800,500,"campus");
 this.add.text(520,40,"FRITZ ACADEMY",{
   fontSize:"54px",fontStyle:"bold",color:"#ffffff",backgroundColor:"#000000cc",padding:{x:12,y:8}
 });

 this.path(800,180,120,760);
 this.path(400,500,900,90);
 this.path(1100,500,900,90);
 this.path(800,650,1200,90);

 this.building("🏫 Main Hall",800,310,240,135,0xfff8df,()=>this.msg("Main Hall","This is where every Academy day begins."));
 this.building("📚 Library",520,505,250,135,0xd9b16f,()=>this.libraryInfo());
 this.building("🌱 Garden",1080,500,250,135,0x9fe27d,()=>this.msg("Garden","The Garden needs seeds and tools before it can grow."));
 this.building("🔧 Workshop",385,740,250,135,0xd8d8d8,()=>this.msg("Workshop","Rascal is building something here."));
 this.building("🎵 Music Hall 🔒",820,790,270,135,0x999999,()=>this.msg("Locked","Keep building the Academy to open Music Hall."));
 this.building("🔬 Science Lab 🔒",1210,740,270,135,0x999999,()=>this.msg("Locked","The Science Lab is locked for now."));
 this.building("🌲 Adventure Forest 🔒",1350,310,310,135,0x5f8f4e,()=>this.msg("Locked","The forest trail opens later."));
 this.building("🚪 Front Gate",800,920,260,100,0xf6c744,()=>this.msg("Front Gate","Welcome back to your Academy."));
}

path(x,y,w,h){this.add.rectangle(x,y,w,h,0xe6c98a).setStrokeStyle(3,0x8b6a2b)}

building(label,x,y,w,h,color,cb){
 let b=this.add.rectangle(x,y,w,h,color).setStrokeStyle(6,0x111111).setInteractive({useHandCursor:true});
 this.add.text(x,y-18,label,{fontSize:"25px",fontStyle:"bold",color:"#102342"}).setOrigin(.5);
 b.on("pointerdown",cb);
}

createPlayer(){
 this.player=this.add.circle(800,870,24,0x174ea6).setStrokeStyle(5,0xffffff);
 this.physics.add.existing(this.player);
 this.player.body.setCollideWorldBounds(true);
 this.add.text(800,905,"YOU",{fontSize:"18px",fontStyle:"bold",color:"#ffffff",backgroundColor:"#000000cc",padding:{x:8,y:4}}).setOrigin(.5);
}

createCharacters(){
 this.npc("Captain Fritz","fritz",760,360,.17,"Welcome back! The Academy remembers what you build.");
 this.npc("Bash","bash",430,585,.17,"The Library still needs books, bricks, and a blueprint.");
 this.npc("Bear","bear",930,430,.17,"I found something near the path.");
 this.npc("Nola","nola",1160,590,.17,"The Garden will grow when we find seeds.");
 this.npc("Rascal","rascal",310,820,.17,"I may have hidden a tool somewhere.");
}

npc(name,key,x,y,scale,line){
 let img=this.add.image(x,y,key).setScale(scale).setInteractive({useHandCursor:true});
 this.add.text(x,y-88,"💬",{fontSize:"30px"}).setOrigin(.5);
 img.on("pointerdown",()=>this.msg(name,line));
}

createCollectibles(){
 this.collect("book","📘",620,655,"books","Book");
 this.collect("brick","🧱",720,600,"bricks","Brick");
 this.collect("blueprint","📜",920,590,"blueprints","Blueprint");
 this.collect("seed","🌱",1120,640,"seeds","Seed");
 this.collect("tool","🔧",360,640,"tools","Tool");
}

collect(id,icon,x,y,type,label){
 if(this.save.collected[id]) return;
 let item=this.add.text(x,y,icon,{fontSize:"48px"}).setOrigin(.5).setInteractive({useHandCursor:true});
 item.on("pointerdown",()=>{
   this.save.pack[type]++;
   this.save.collected[id]=true;
   this.checkBuild();
   setSave(this.save);
   this.msg("Builder's Pack",`You collected: ${label}`);
   item.destroy();
   this.refreshHUD();
 });
}

checkBuild(){
 let p=this.save.pack;
 if(p.books>=1 && p.bricks>=1 && p.blueprints>=1 && this.save.academy.library.progress<25){
   this.save.academy.library.progress=25;
   this.save.academy.library.stage="walls started";
   this.save.xp+=10;
   this.save.stars+=1;
 }
}

libraryInfo(){
 let l=this.save.academy.library;
 this.msg("Library",`Stage: ${l.stage}\nProgress: ${l.progress}%\nNeeded now: books, bricks, and blueprints.`);
}

createHUD(){
 this.hud=this.add.container(0,0).setScrollFactor(0);
 this.hudBg=this.add.rectangle(400,38,780,70,0x102342).setStrokeStyle(5,0x111111);
 this.hudText=this.add.text(25,18,"",{fontSize:"21px",fontStyle:"bold",color:"#ffffff"});
 this.packBg=this.add.rectangle(400,562,780,62,0x102342).setStrokeStyle(5,0x111111);
 this.packText=this.add.text(25,542,"",{fontSize:"23px",fontStyle:"bold",color:"#ffffff"});
 this.hud.add([this.hudBg,this.hudText,this.packBg,this.packText]);
 this.refreshHUD();
}

refreshHUD(){
 let s=this.save,p=s.pack;
 this.hudText.setText(`${s.studentName} | ${s.currentStory} | XP ${s.xp} | Stars ${s.stars}`);
 this.packText.setText(`Builder's Pack: 📘 ${p.books}  🧱 ${p.bricks}  📜 ${p.blueprints}  🌱 ${p.seeds}  🔧 ${p.tools}  🔑 ${p.keys}`);
}

createMobileControls(){
 let y=455,x=75;
 let make=(txt,dx,dy)=>{
  let b=this.add.text(x+dx,y+dy,txt,{fontSize:"34px",backgroundColor:"#f6c744",color:"#102342",padding:{x:14,y:8},fontStyle:"bold"})
   .setScrollFactor(0).setInteractive({useHandCursor:true});
  b.dir={x:dx===-45?-1:dx===45?1:0,y:dy===-45?-1:dy===45?1:0};
  b.on("pointerdown",()=>this.mobileDir=b.dir);
  b.on("pointerup",()=>this.mobileDir=null);
  b.on("pointerout",()=>this.mobileDir=null);
 };
 make("↑",0,-45); make("↓",0,45); make("←",-45,0); make("→",45,0);
}

update(){
 let speed=210, vx=0, vy=0;
 if(this.keys.LEFT.isDown||this.keys.A.isDown) vx=-speed;
 if(this.keys.RIGHT.isDown||this.keys.D.isDown) vx=speed;
 if(this.keys.UP.isDown||this.keys.W.isDown) vy=-speed;
 if(this.keys.DOWN.isDown||this.keys.S.isDown) vy=speed;
 if(this.mobileDir){vx=this.mobileDir.x*speed;vy=this.mobileDir.y*speed;}
 this.player.body.setVelocity(vx,vy);
}

msg(title,body){
 if(this.popup)this.popup.destroy();
 this.popup=this.add.container(400,300).setScrollFactor(0);
 let bg=this.add.rectangle(0,0,610,290,0xffffff).setStrokeStyle(7,0x111111);
 let t=this.add.text(0,-105,title,{fontSize:"34px",fontStyle:"bold",color:"#102342"}).setOrigin(.5);
 let b=this.add.text(0,-30,body,{fontSize:"24px",fontStyle:"bold",color:"#102342",align:"center",wordWrap:{width:540}}).setOrigin(.5);
 let close=this.add.text(0,92,"Close",{fontSize:"26px",fontStyle:"bold",color:"#102342",backgroundColor:"#f6c744",padding:{x:26,y:12}})
   .setOrigin(.5).setInteractive({useHandCursor:true});
 close.on("pointerdown",()=>this.popup.destroy());
 this.popup.add([bg,t,b,close]);
}
}

new Phaser.Game({
 type:Phaser.AUTO,
 parent:"game",
 width:800,
 height:600,
 scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},
 physics:{default:"arcade"},
 scene:World
});
</script>
</body>
</html>
