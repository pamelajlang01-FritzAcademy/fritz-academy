<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fritz Academy Week 1</title>
<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(#79d9ff 0 45%,#eafaff 46%,#72bf58 47%);color:#102342}
header,main{max-width:1100px;margin:16px auto}
header{background:#102342;color:white;border:6px solid #111;border-radius:28px;padding:18px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 10px 0 #111}
.logo{font-size:38px;font-weight:900}
main{background:#fff8df;border:6px solid #111;border-radius:32px;padding:24px;box-shadow:0 12px 0 #111}
h1{font-size:52px;margin:0 0 10px}
h2{font-size:34px}
p{font-size:22px;font-weight:800}
button{font-size:22px;font-weight:900;background:#f6c744;border:5px solid #111;border-radius:18px;padding:14px 22px;box-shadow:0 7px 0 #111;cursor:pointer;margin:8px}
.stage{background:white;border:5px solid #111;border-radius:26px;padding:24px;text-align:center;box-shadow:0 8px 0 #111;min-height:520px}
.fritz{max-height:260px;max-width:100%;object-fit:contain}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:20px}
.tile{background:#fff8df;border:4px solid #111;border-radius:20px;padding:20px;font-size:24px;font-weight:900;cursor:pointer}
.bigtext{font-size:52px;font-weight:900}
@media(max-width:800px){.grid{grid-template-columns:1fr}h1{font-size:40px}header{flex-direction:column;text-align:center}}
</style>
</head>
<body>

<header>
  <div class="logo">Fritz Academy · Week 1</div>
  <a href="index.html" style="color:white;font-weight:bold;font-size:20px;">Home</a>
</header>

<main>
  <section class="stage" id="stage">
    <img class="fritz" src="assets/ElevenLabs_image_GPT%20Image%202_Full%20body%20portrait%20of%20Captain%20.png" alt="Captain Fritz">
    <h1>Welcome to Week 1!</h1>
    <p>Today we learn greetings, names, and letters.</p>
    <button onclick="showSong()">Start Lesson</button>
  </section>
</main>

<script>
function speak(text){
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.rate=.75; u.pitch=1.05; u.lang="en-US";
  speechSynthesis.speak(u);
}
function set(html){document.getElementById("stage").innerHTML=html}

function showSong(){
set(`
<h1>🎵 Song Time</h1>
<p>Play the Alphabet Adventure song here.</p>
<img class="fritz" src="assets/ElevenLabs_image_GPT%20Image%202_Full%20body%20portrait%20of%20Captain%20.png">
<br>
<button onclick="speak('Hello Academites. Welcome to Fritz Academy.')">Fritz Greeting</button>
<button onclick="showVocab()">Next</button>
`);
}

function showVocab(){
set(`
<h1>Vocabulary Warm-Up</h1>
<p>Click each word. Student listens and repeats.</p>
<div class="grid">
<div class="tile" onclick="speak('hello')">Hello</div>
<div class="tile" onclick="speak('I')">I</div>
<div class="tile" onclick="speak('am')">am</div>
<div class="tile" onclick="speak('my')">my</div>
<div class="tile" onclick="speak('name')">name</div>
<div class="tile" onclick="speak('letter')">letter</div>
</div>
<button onclick="showStory()">Next</button>
`);
}

function showStory(){
set(`
<h1>Teacher Story</h1>
<p class="bigtext">Captain Fritz opens the gate to Fritz Academy.</p>
<img class="fritz" src="assets/ElevenLabs_image_GPT%20Image%202_Full%20body%20portrait%20of%20Captain%20.png">
<br>
<button onclick="speak('Captain Fritz opens the gate to Fritz Academy.')">Read Page</button>
<button onclick="showReader1()">Next</button>
`);
}

function showReader1(){
set(`
<h1>Little Reader 1</h1>
<p class="bigtext">Hello!</p>
<button onclick="speak('Hello')">Read</button>
<p class="bigtext">My name is Fritz.</p>
<button onclick="speak('My name is Fritz.')">Read</button>
<br>
<button onclick="showReader2()">Next</button>
`);
}

function showReader2(){
set(`
<h1>Little Reader 2</h1>
<p class="bigtext">I see A.</p>
<button onclick="speak('I see A.')">Read</button>
<p class="bigtext">I see a letter.</p>
<button onclick="speak('I see a letter.')">Read</button>
<br>
<button onclick="showGame()">Next</button>
`);
}

function showGame(){
set(`
<h1>Game: Find the Word</h1>
<p>Find: <b>my</b></p>
<div class="grid">
<div class="tile" onclick="speak('Try again')">I</div>
<div class="tile" onclick="speak('Great job. My.')">my</div>
<div class="tile" onclick="speak('Try again')">am</div>
</div>
<button onclick="showReward()">Next</button>
`);
}

function showReward(){
set(`
<h1>⭐ Sticker Time!</h1>
<img class="fritz" src="assets/ElevenLabs_image_GPT%20Image%202_Full%20body%20portrait%20of%20Captain%20.png">
<p>You earned an Academy Block.</p>
<button onclick="location.href='index.html'">Finish Lesson</button>
`);
}
</script>
</body>
</html>
